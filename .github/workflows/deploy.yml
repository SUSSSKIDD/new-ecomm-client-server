name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  check_changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            client:
              - 'client/**'

  # ── Build client (parallel, independent of tests) ───────────────────────────
  build_client:
    name: Build Client
    needs: check_changes
    if: needs.check_changes.outputs.client == 'true' || needs.check_changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client deps
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build
        env:
          VITE_API_URL: /api

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  # ── E2E tests (parallel with client build) ──────────────────────────────────
  test:
    name: E2E Tests
    needs: check_changes
    if: needs.check_changes.outputs.server == 'true'
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: neyokart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install server deps
        run: cd server && npm ci

      - name: Setup Prisma
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/neyokart_test
          DIRECT_URL: postgresql://postgres:password123@localhost:5432/neyokart_test
        run: |
          cd server
          npx prisma db push --accept-data-loss
          npx prisma generate
          node seed.mjs

      - name: Build server
        run: cd server && npm run build

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/neyokart_test
          DIRECT_URL: postgresql://postgres:password123@localhost:5432/neyokart_test
          REDIS_URL: redis://localhost:6379
          RIDER_REDIS_URL: redis://localhost:6379
          BULL_REDIS_HOST: localhost
          BULL_REDIS_PORT: 6379
          JWT_SECRET: "ci-cd-test-secret-key-12345"
          SUPER_ADMIN_PHONE: "+917785945524"
          SUPER_ADMIN_PIN: "5015"
          PORT: 3000
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_TEST_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_TEST_KEY_SECRET }}
          RAZORPAY_TEST_KEY_ID: ${{ secrets.RAZORPAY_TEST_KEY_ID }}
          MSG91_AUTH_KEY: mock_key
          MAX_DELIVERY_RADIUS_KM: 14
        run: |
          cd server
          node --enable-source-maps dist/src/main.js &
          echo "Waiting for backend..."
          until curl -sf http://localhost:3000/api > /dev/null; do sleep 2; done
          node test/universal-e2e.mjs http://localhost:3000

  # ── Deploy — waits for both jobs ────────────────────────────────────────────
  deploy:
    name: Zero-Downtime VPS Deployment
    needs: [check_changes, test, build_client]
    if: |
      always() &&
      needs.check_changes.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build_client.result == 'success' || needs.build_client.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy source to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/,client/,scripts/,docker-compose.prod.yml"
          target: "/opt/neyokart"

      - name: Deploy on VPS
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod +x /opt/neyokart/scripts/deployment/deploy.sh
            cd /opt/neyokart
            bash ./scripts/deployment/deploy.sh

      - name: Retry Deploy
        if: steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod +x /opt/neyokart/scripts/deployment/deploy.sh
            cd /opt/neyokart
            bash ./scripts/deployment/deploy.sh
