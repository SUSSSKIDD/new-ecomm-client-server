services:
  - type: web
    name: neyokart-api
    runtime: docker
    region: singapore   # closest to Supabase ap-southeast-1
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false        # set in Render dashboard
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false        # e.g. https://your-frontend.vercel.app
      - key: SUPER_ADMIN_PHONE
        sync: false
      - key: SUPER_ADMIN_PIN
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_BASE_URL
        value: "https://control.msg91.com/api/v5"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: RIDER_REDIS1_URL
        sync: false
      - key: RIDER_REDIS1_TOKEN
        sync: false
      - key: RIDER_REDIS2_URL
        sync: false
      - key: RIDER_REDIS2_TOKEN
        sync: false
      - key: ORDER_CLAIM_TIMEOUT_SECONDS
        value: "120"
      - key: DELIVERY_FEE
        value: "40"
      - key: TAX_RATE
        value: "0.05"
      - key: FREE_DELIVERY_THRESHOLD
        value: "500"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
