# This file runs strictly on the Hostinger VPS.
# Blue/Green deployment: traffic is routed via nginx on the host.
# Redis is shared and persistent across both slots.
services:
  redis:
    image: redis:7-alpine
    container_name: neyokart-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - neyokart_redis_data:/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── BLUE ────────────────────────────────────────────────────────────────────
  server-blue:
    build:
      context: ./server
    image: neyokart-server:latest
    container_name: neyokart-server-blue
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - RIDER_REDIS_URL=redis://redis:6379
      - BULL_REDIS_HOST=redis
      - BULL_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  client-blue:
    build:
      context: ./client
      args:
        - VITE_API_URL=/api
    image: neyokart-client:latest
    container_name: neyokart-client-blue
    ports:
      - "8001:80"
    depends_on:
      - server-blue
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── GREEN ───────────────────────────────────────────────────────────────────
  server-green:
    build:
      context: ./server
    image: neyokart-server:latest
    container_name: neyokart-server-green
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - RIDER_REDIS_URL=redis://redis:6379
      - BULL_REDIS_HOST=redis
      - BULL_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  client-green:
    build:
      context: ./client
      args:
        - VITE_API_URL=/api
    image: neyokart-client:latest
    container_name: neyokart-client-green
    ports:
      - "8002:80"
    depends_on:
      - server-green
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  neyokart_redis_data:
