# /etc/nginx/sites-available/neyokart
# Nginx Configuration Template for Zero-Downtime Deployment
# Note: DO NOT manually edit the `proxy_pass` ports. The deploy.sh script handles swapping them.

server {
    listen 80;
    server_name neyokart.com www.neyokart.com neyokart.in www.neyokart.in;

    # ---------------------------------------------------------
    # Frontend Reverse Proxy (Client React App)
    # The deploy.sh script will automatically swap 8001 / 8002
    # ---------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ---------------------------------------------------------
    # Backend API + SSE Reverse Proxy (NestJS)
    # The deploy.sh script will automatically swap 3001 / 3002
    # ---------------------------------------------------------
    location /api/ {
        # Assuming your NestJS app uses the global prefix /api
        proxy_pass http://127.0.0.1:3001/; # The trailing slash strips /api off the proxy
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;

        # CRITICAL FOR SERVER-SENT EVENTS (SSE)
        # Prevents Nginx from buffering the chunks, allowing real-time delivery
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # Keep connections alive for SSE (otherwise nginx defaults to 60s drop)
        proxy_read_timeout 24h;
        proxy_connect_timeout 60s;
    }
}
